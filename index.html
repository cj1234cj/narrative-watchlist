let PW = "";
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function decryptWith(data, pw){
  const enc = new TextEncoder();
  const base = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:b64(data.salt), iterations:data.iter, hash:'SHA-256'},
    base, {name:'AES-GCM', length:256}, false, ['decrypt']);
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(data.iv)}, key, b64(data.ct));
  return new TextDecoder().decode(pt);
}
function render(html, generated){
  const view = document.getElementById('view');
  view.srcdoc = html; view.style.display = 'block';
  document.getElementById('gate').style.display = 'none';
  document.getElementById('bar').style.display = 'flex';
  if(generated) document.getElementById('upd').textContent = 'Updated ' + generated;
}
async function unlock(){
  const err = document.getElementById('err'); err.textContent = '';
  const pw = document.getElementById('pw').value;
  try{
    const html = await decryptWith(DATA, pw);
    PW = pw;                     // kept in memory only, so Refresh needs no re-login
    render(html, DATA.generated);
  }catch(e){ err.textContent = 'Wrong password.'; }
}
async function refresh(){
  const btn = document.getElementById('refresh');
  btn.disabled = true; btn.textContent = '…';
  try{
    // re-fetch the latest published page, bypassing cache, and re-decrypt in place
    const res = await fetch(location.pathname + '?t=' + Date.now(), {cache:'no-store'});
    const txt = await res.text();
    const m = txt.match(/const DATA = (\{[\s\S]*?\});/);
    const fresh = JSON.parse(m[1]);
    render(await decryptWith(fresh, PW), fresh.generated);
  }catch(e){ /* keep showing current view on failure */ }
  btn.disabled = false; btn.textContent = '⟳ Refresh';
}
document.getElementById('go').onclick = unlock;
document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') unlock(); });
document.getElementById('refresh').onclick = refresh;
</script></body></html>
